syntax = "proto3";

package student;

service StudentService {
    // Öğrenci ID'sine göre temel profil bilgilerini getiren fonksiyon
    rpc GetStudentProfile (GetStudentRequest) returns (StudentProfileResponse);
}

message GetStudentRequest {
    int64 student_id = 1;  // int32 yerine int64 yapıldı
}

message StudentProfileResponse {
    int64 id = 1;          // int32 yerine int64 yapıldı
    string first_name = 2;
    string last_name = 3;
    string email = 4;
    string home_university = 5;
    string host_university = 6;
}